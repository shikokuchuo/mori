<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 310" fill="none">
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'Hiragino Sans', sans-serif;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
      }
      .memory-box { fill: none; stroke: #d2604a; stroke-width: 1; }
      .memory-label { font-size: 13px; fill: #d2604a; font-weight: 500; letter-spacing: 0.5px; }
      .memory-caption { font-size: 11px; fill: #8a8079; }
      .process-box { fill: none; stroke: #c7bfb5; stroke-width: 0.75; }
      .process-label { font-size: 12.5px; fill: #6b635b; font-weight: 400; }
      .conn { stroke: #c7bfb5; stroke-width: 0.75; }
      .dotted { stroke: #c7bfb5; stroke-width: 0.75; stroke-dasharray: 2 3; }
      .arrow { fill: #c7bfb5; }
      .arrow-accent { fill: #d2604a; }
      .code-label { font-size: 11px; fill: #8a8079; }
      .annotation { font-size: 11px; fill: #8a8079; }
      .caption { font-size: 11px; fill: #8a8079; font-style: italic; }
    </style>
  </defs>

  <!-- Shared Memory box (top, coral — the central element) -->
  <rect class="memory-box" x="250" y="20" width="220" height="60" rx="1" />
  <text class="memory-label" x="360" y="46" text-anchor="middle">Shared memory</text>
  <text class="memory-caption" x="360" y="64" text-anchor="middle">OS-backed</text>

  <!-- share(obj) input — dotted line + coral arrowhead penetrating the box -->
  <text class="code-label mono" x="200" y="46" text-anchor="end">share(obj)</text>
  <text class="annotation" x="200" y="62" text-anchor="end">write once</text>
  <line class="dotted" x1="205" y1="50" x2="261" y2="50" />
  <polygon class="arrow-accent" points="269,50 261,46 261,54" />

  <!-- Trunk down from memory box -->
  <line class="conn" x1="360" y1="80" x2="360" y2="140" />
  <!-- Crossbar -->
  <line class="conn" x1="100" y1="140" x2="620" y2="140" />
  <!-- mmap annotation -->
  <text class="annotation mono" x="370" y="130">mmap</text>

  <!-- Prongs to processes (taupe, downward arrows just above each box) -->
  <line class="conn" x1="100" y1="140" x2="100" y2="194" />
  <polygon class="arrow" points="100,198 96,191 104,191" />
  <line class="conn" x1="273" y1="140" x2="273" y2="194" />
  <polygon class="arrow" points="273,198 269,191 277,191" />
  <line class="conn" x1="447" y1="140" x2="447" y2="194" />
  <polygon class="arrow" points="447,198 443,191 451,191" />
  <line class="conn" x1="620" y1="140" x2="620" y2="194" />
  <polygon class="arrow" points="620,198 616,191 624,191" />

  <!-- Process boxes (taupe outline, mid-grey label) -->
  <rect class="process-box" x="40" y="202" width="120" height="34" rx="1" />
  <text class="process-label" x="100" y="223" text-anchor="middle">Process 1</text>

  <rect class="process-box" x="213" y="202" width="120" height="34" rx="1" />
  <text class="process-label" x="273" y="223" text-anchor="middle">Process 2</text>

  <rect class="process-box" x="387" y="202" width="120" height="34" rx="1" />
  <text class="process-label" x="447" y="223" text-anchor="middle">Process 3</text>

  <rect class="process-box" x="560" y="202" width="120" height="34" rx="1" />
  <text class="process-label" x="620" y="223" text-anchor="middle">Process 4</text>

  <!-- Subtitle -->
  <text class="caption" x="360" y="270" text-anchor="middle">ALTREP wrappers — zero-copy reads</text>

</svg>
